<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amor💖</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #ec456f, #1b0209);
    overflow-x: hidden;
    min-height: 100vh;
}

/* PANTALLAS */
.screen {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* OCULTAR */
.hidden {
    display: none;
}

/* Imagen conejo */
img {
    width: 250px;
    height: 250px;
    max-width: 90vw;
    height: auto;
    aspect-ratio: 1;
    border-radius: 50%;
    filter: drop-shadow(4px 8px 9px #620303);
    cursor: pointer;
    transition: transform 0.3s;
}

img:hover {
    transform: scale(1.1);
}

/* Texto tocar */
.mensaje {
    margin-top: 20px;
    font-size: 22px;
    color: #a10d0d;
    font-weight: bold;
    animation: latido 1s infinite;
    text-align: center;
    padding: 0 10px;
}

@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* VIDEO */
.video-container {
    width: 90%;
    max-width: 560px;
    aspect-ratio: 16/9;
    margin-top: 20px;
    border-radius: 15px;
    overflow: hidden;
}

.video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* TEXTO */
#dedication-text {
    width: 90%;
    max-width: 500px;
    margin-top: 20px;
    background-color: rgba(255, 182, 193, 0.95);
    padding: 20px;
    border-radius: 15px;
    color: #d90d0d;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-y: auto;
    max-height: 60vh;
}

/* CORAZONES */
@keyframes float {
    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

/* RESPONSIVE - TABLETAS */
@media (max-width: 768px) {
    .screen {
        padding: 15px;
    }

    img {
        width: 200px;
        height: 200px;
    }

    .mensaje {
        font-size: 18px;
        margin-top: 15px;
    }

    #dedication-text {
        font-size: 18px;
        padding: 15px;
        margin-top: 15px;
    }

    .video-container {
        margin-top: 15px;
    }
}

/* RESPONSIVE - MÓVILES */
@media (max-width: 480px) {
    .screen {
        padding: 10px;
        min-height: auto;
    }

    img {
        width: 150px;
        height: 150px;
    }

    .mensaje {
        font-size: 16px;
        margin-top: 10px;
    }

    .video-container {
        width: 95%;
        margin-top: 10px;
    }

    #dedication-text {
        width: 95%;
        font-size: 16px;
        padding: 12px;
        margin-top: 10px;
        max-height: 50vh;
    }
}
</style>

</head>

<body>

<!-- 💖 PANTALLA 1 -->
<div id="pantalla1" class="screen">
    <img src="https://img.freepik.com/fotos-premium/ilustracion-kawaii-conejos-lindos_1158260-7633.jpg" onclick="cambiarPantalla()">
    <div class="mensaje">💖 tócame para ver algo especial 💖</div>
</div>

<!-- 💌 PANTALLA 2 -->
<div id="pantalla2" class="screen hidden">

    <div class="video-container">
        <video id="videoReik" controls autoplay playsinline style="width: 100%; height: 100%; border-radius: 15px;">
            <source src="video/Alvaro Soler - Sofia.mp4" type="video/mp4">
            Tu navegador no soporta el video HTML5
        </video>
    </div>

    <div id="dedication-text"></div>

</div>

<script>
// CAMBIAR PANTALLA
function cambiarPantalla() {
    document.getElementById("pantalla1").classList.add("hidden");
    document.getElementById("pantalla2").classList.remove("hidden");
    const video = document.getElementById("videoReik");
    if (video) {
        video.muted = false;
        video.play().catch(() => {
            // Si el navegador bloquea autoplay con audio, mantener controls para que el usuario pueda reproducirlo manualmente
        });
    }
    escribirTexto();
}

// TEXTO ANIMADO
function escribirTexto() {
let text = `amor… 💕
desde que llegaste a mi vida 🌎✨
todo es más bonito 🌷,
las noches brillan más 🌙⭐
y mi corazón late solo por ti ❤️‍🔥💓

Tu sonrisa 😊 es mi lugar favorito 🏡
tu voz 🎶 es mi canción preferida 🎧
y tu abrazo 🤗 es donde quiero quedarme siempre 🥰💞

Te quiero hoy, mañana
y por toda la eternidad 💞🌹✨`;

let i = 0;
const container = document.getElementById("dedication-text");

function type() {
    if (i < text.length) {
        container.textContent += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}

container.textContent = "";
type();
}

// CORAZONES
setInterval(() => {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.bottom = "0";
    heart.style.fontSize = "20px";
    heart.style.animation = "float 4s linear";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
}, 500);
</script>

</body>
</html>
